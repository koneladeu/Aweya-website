<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article | Le Journal d'Aweya</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        .article-container {
            padding: 4rem 4%;
            max-width: 800px; /* Plus serré pour un confort de lecture optimal */
            margin: 0 auto;
        }
        .article-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .article-meta {
            font-size: 0.85rem;
            color: var(--texte-secondaire);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 1rem;
        }
        .article-main-title {
            font-family: var(--police-titre);
            font-size: 3rem;
            line-height: 1.2;
            font-weight: 400;
            color: var(--texte-sombre);
        }
        .article-banner img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            border-radius: var(--arrondi-doux);
            margin-bottom: 3rem;
        }
        .article-body {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.8;
            color: var(--texte-sombre);
        }
        /* Style des paragraphes dynamiques */
        .article-body p {
            margin-bottom: 1.8rem;
        }
        @media (max-width: 768px) {
            .article-main-title { font-size: 2rem; }
            .article-banner img { height: 280px; }
        }
    </style>
</head>
<body>

    <header class="main-header"></header>

    <main class="article-container" id="article-detail-content">
        <div style="text-align: center; padding: 5rem 0; color: var(--texte-secondaire);">
            Chargement de votre article de conseils...
        </div>
    </main>

    <footer class="main-footer"></footer>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/article-detail.js"></script>
</body>
</html>
