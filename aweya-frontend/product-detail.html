<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail Produit | Aweya – Sooo Aweya</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Styles spécifiques pour l'organisation de la fiche produit */
        .detail-container {
            padding: 4rem 4%;
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 4rem;
        }
        .detail-gallery {
            flex: 1;
        }
        .detail-gallery img {
            width: 100%;
            height: 550px;
            object-fit: cover;
            background-color: var(--gris-tres-clair);
            border-radius: var(--arrondi-doux);
        }
        .detail-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .detail-title {
            font-family: var(--police-titre);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            font-weight: 400;
        }
        .detail-price {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }
        .detail-description {
            font-weight: 300;
            color: var(--texte-secondaire);
            margin-bottom: 2.5rem;
            white-space: pre-line; /* Conserve les retours à la ligne de Strapi */
        }
        .detail-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .detail-container {
                flex-direction: column;
                gap: 2rem;
                padding: 2rem 1.5rem;
            }
            .detail-gallery img {
                height: 400px;
            }
            .detail-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <header class="main-header"></header>

    <main class="detail-container" id="product-detail-content">
        <!-- Zone de chargement temporaire, remplacée par le JavaScript -->
        <div style="text-align: center; width: 100%; padding: 5rem 0; color: var(--texte-secondaire);">
            Chargement des détails de votre pièce...
        </div>
    </main>

    <!-- Injection automatique du Footer via main.js -->
    <footer class="main-footer"></footer>

    <!-- Chat WhatsApp Intégré -->
    <a href="https://wa.me/2250000000000?text=Bonjour%20Aweya" class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Discuter sur WhatsApp">
    </a>

    <!-- Scripts JavaScript -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/main.js"></script>
    <!-- Nouveau script dédié pour la logique de cette page -->
    <script src="assets/js/produit-detail.js"></script>
</body>
</html>
