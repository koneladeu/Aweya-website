<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | Aweya – Sooo Aweya</title>
    <!-- Styles globaux -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Polices Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Styles spécifiques pour l'organisation de la boutique */
        .shop-container {
            padding: 4rem 4%;
            max-width: 1200px;
            margin: 0 auto;
        }
        /* Barre de filtres (onglets) */
        .shop-filters {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: none;
            font-family: var(--police-corps);
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--texte-secondaire);
            padding: 0.5rem 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: var(--transition-douce);
            position: relative;
        }
        .filter-btn:hover,
        .filter-btn.active {
            color: var(--texte-sombre);
            font-weight: 500;
        }
        .filter-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            width: 80%;
            height: 2px;
            background-color: var(--texte-sombre);
        }
        /* Zone d'affichage des messages (chargement, erreur) */
        .shop-status {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem;
            color: var(--texte-secondaire);
            font-weight: 300;
        }
    </style>
</head>
<body>
    
    <!-- Injection automatique du Header via main.js -->
    <header class="main-header"></header>

    <main class="shop-container">
        <!-- Titre de la section -->
        <div class="section-title">
            <h2>La Collection Aweya</h2>
            <p>Trouvez les pièces qui révèlent votre douceur et votre élégance</p>
        </div>

        <!-- Onglets de filtres (Basés sur les catégories du brief) -->
        <div class="shop-filters">
            <button class="filter-btn active" data-filter="tous">Tout explorer</button>
            <button class="filter-btn" data-filter="Ensembles_Lingerie">Ensembles Lingerie</button>
            <button class="filter-btn" data-filter="Homewear">Homewear</button>
            <button class="filter-btn" data-filter="nouveautes">Nouveautés</button>
            <button class="filter-btn" data-filter="promotions">Promotions</button>
        </div>

        <!-- Grille de produits dynamique -->
        <!-- JavaScript (boutique.js) viendra injecter les cartes ici -->
        <div class="products-grid" id="shop-products-grid">
            <div class="shop-status">Chargement de la collection...</div>
        </div>

        <!-- Injection automatique du Footer via main.js -->
    <footer class="main-footer"></footer>

    <!-- Chat WhatsApp Intégré -->
    <a href="https://wa.me/+2250798627388?text=Bonjour%20Aweya,%20je%20souhaite%20avoir%20des%20informations." class="whatsapp-float" target="_blank" rel="noopener noreferrer">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="Discuter sur WhatsApp">
    </a>

    <!-- Scripts JavaScript -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/main.js"></script>
    
    <!-- Nouveau script dédié uniquement à la logique de la boutique -->
    <script src="assets/js/boutique.js"></script>
    </main>
</body>
